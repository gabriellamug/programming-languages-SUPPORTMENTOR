<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXPRESS SupportMentor</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    margin: 0;
    padding: 0;
}
.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
h1 {
    text-align: center;
    color: #4b0082;
}
textarea {
    width: 100%;
    height: 90px;
    font-size: 16px;
    padding: 10px;
}
button {
    background: #6a11cb;
    color: white;
    border: none;
    padding: 12px 18px;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    background: #4b0082;
}
.section {
    margin-top: 20px;
}
.box {
    background: #f4f4f8;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
}
.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}
.stat {
    background: #eef;
    padding: 10px;
    border-radius: 8px;
    width: 30%;
    text-align: center;
}
.actions {
    margin-top: 15px;
}
.actions button {
    margin-right: 10px;
}
.footer {
    text-align: center;
    margin-top: 25px;
    color: #555;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚚 EXPRESS SupportMentor</h1>

    <div class="section">
        <h3>Customer Inquiry</h3>
        <textarea id="query" placeholder="Type customer message here..."></textarea>
        <br><br>
        <button onclick="generate()">Generate Response</button>
    </div>

    <div class="section">
        <h3>📚 Retrieved Knowledge</h3>
        <div class="box" id="knowledge">Waiting for query…</div>
    </div>

    <div class="section">
        <h3>💬 Suggested Response</h3>
        <div class="box" id="response">No response yet.</div>
    </div>

    <div class="section">
        <h3>🎯 Coaching Feedback</h3>
        <div class="box" id="coaching">
            Tone ⭐⭐⭐⭐☆<br>
            Clarity ⭐⭐⭐⭐☆<br>
            Completeness ⭐⭐⭐⭐☆
        </div>
    </div>

    <div class="actions">
        <button onclick="accept()">✅ Accept</button>
        <button onclick="edit()">✏️ Edit</button>
    </div>

    <div class="stats">
        <div class="stat">Sessions<br><b id="sCount">1</b></div>
        <div class="stat">Accepted<br><b id="aCount">0</b></div>
        <div class="stat">Edits<br><b id="eCount">0</b></div>
    </div>

    <div class="footer">
        We deliver excellence, every time.
    </div>
</div>

<script>
let accepted = 0;
let edited = 0;

async function generate() {
    const q = document.getElementById("query").value;

    // Reset UI for a NEW question
    document.getElementById("knowledge").innerText =
        "Searching EXPRESS knowledge base...";
    document.getElementById("response").innerText =
        "Generating response...";
    document.getElementById("coaching").innerHTML =
        "Tone ⭐⭐⭐⭐☆<br>Clarity ⭐⭐⭐⭐☆<br>Completeness ⭐⭐⭐⭐☆";

    // Reset counters per response
    accepted = 0;
    edited = 0;
    document.getElementById("aCount").innerText = accepted;
    document.getElementById("eCount").innerText = edited;

    const res = await fetch("http://localhost:8000/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            agent_id: "agent_1",
            query: q
        })
    });

    const data = await res.json();

    document.getElementById("knowledge").innerText =
        "Relevant EXPRESS policy applied based on your question.";
    document.getElementById("response").innerText = data.response;
}

function accept() {
    if (accepted === 0) {
        accepted = 1;
        document.getElementById("aCount").innerText = accepted;
        alert("Response accepted!");
    } else {
        alert("This response has already been accepted.");
    }
}

function edit() {
    if (edited === 0) {
        edited = 1;
        document.getElementById("eCount").innerText = edited;
        alert("Edit mode enabled (simulated).");
    } else {
        alert("This response has already been edited.");
    }
}
</script>


</body>
</html>
